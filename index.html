<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Adil &amp; Sania</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    background: #FAF5EF;
  }


  /* ════════════════════════════════════════
     ENVELOPE OVERLAY — fixed full-screen,
     sits on top of everything until dismissed
  ════════════════════════════════════════ */

  #envOverlay {
    position: fixed;
    inset: 0;
    z-index: 100;
    background: #FAF5EF;
    display: flex;
    align-items: center;
    justify-content: center;
    /* cross-fade out is applied via JS */
  }

  .envelope-stage {
    position: relative;
    width: min(460px, 86vw);
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* ── Envelope ── */
  .envelope-wrapper {
    position: relative;
    width: 100%;
    cursor: pointer;
  }

  .envelope-wrapper.opened {
    cursor: default;
  }

  .envelope-body-clip {
    position: relative;
    overflow: hidden;
    border-radius: 2px;
    box-shadow: 0 6px 28px rgba(0,0,0,0.13);
  }

  .envelope-inside {
    display: block;
    width: 100%; height: auto;
    position: relative;
    z-index: 1;
  }

  .envelope-outside {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: auto;
    z-index: 5;
    pointer-events: none;
  }

  .flap-container {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    perspective: 1000px;
    z-index: 10;
  }

  .flap {
    width: 100%;
    transform-style: preserve-3d;
    -webkit-transform-style: preserve-3d;
    transform-origin: top center;
    /* transition added when needed */
  }

  .flap-front,
  .flap-back {
    display: block;
    width: 100%; height: auto;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
  }

  .flap-front { position: relative; }

  .flap-back {
    position: absolute;
    top: 0; left: 0;
    transform: rotateX(180deg);
  }

  /* ── Names + hints ── */
  .names-label {
    margin-top: 14px;
    font-family: 'Georgia', serif;
    font-size: clamp(14px, 3.8vw, 19px);
    color: #7A624E;
    letter-spacing: 0.22em;
    font-weight: normal;
    text-align: center;
  }

  .tap-hint {
    margin-top: 14px;
    font-family: 'Georgia', serif;
    font-size: 11px;
    color: #B09880;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    text-align: center;
    transition: opacity 0.35s ease;
  }


  /* ════════════════════════════════════════
     SCROLL HINT — fixed, shown after cross-fade
  ════════════════════════════════════════ */

  #scrollHint {
    position: fixed;
    bottom: 28px;
    left: 0; right: 0;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    font-family: 'Georgia', serif;
    font-size: 10px;
    color: #B09880;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.6s ease;
  }

  #scrollHint .line {
    width: 1px;
    height: 22px;
    background: #B09880;
    transform-origin: top center;
    animation: drip 1.8s ease-in-out infinite;
  }

  @keyframes drip {
    0%   { transform: scaleY(0);  opacity: 0; }
    20%  { opacity: 1; }
    100% { transform: scaleY(1);  opacity: 0.2; }
  }


  /* ════════════════════════════════════════
     CARD FRAME — fixed overlay, always centred.
  ════════════════════════════════════════ */

  /* Fixed frame that holds every card */
  #card-frame {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    z-index: 10;
  }

  /* Each card is stacked in the centre */
  .card-entrance {
    position: absolute;
    width: min(420px, 83vw);
    will-change: transform, opacity;
    pointer-events: auto;
  }

  /* Perspective context */
  .card-stage {
    width: 100%;
    perspective: 1200px;
  }

  /* 3D flip */
  .card-flipper {
    width: 100%;
    transform-style: preserve-3d;
    -webkit-transform-style: preserve-3d;
    will-change: transform;
  }

  .card-face {
    display: block;
    width: 100%; height: auto;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
  }

  .card-face.back {
    position: absolute;
    top: 0; left: 0;
    transform: rotateY(180deg);
  }


  /* ════════════════════════════════════════
     WELCOME SCREEN — fades in after envelope opens,
     fades out as user begins to scroll
  ════════════════════════════════════════ */

  #welcomeScreen {
    position: fixed;
    inset: 0;
    z-index: 20;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 0 40px;
    opacity: 0;
    pointer-events: none;
    /* transition added via JS */
  }

  .welcome-eyebrow {
    font-family: 'Georgia', serif;
    font-size: clamp(11px, 3vw, 13px);
    color: #B09880;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    margin-bottom: 16px;
  }

  .welcome-title {
    font-family: 'Georgia', serif;
    font-size: clamp(28px, 8vw, 48px);
    color: #3A2718;
    letter-spacing: 0.1em;
    font-weight: normal;
    line-height: 1.2;
    margin-bottom: 20px;
  }

  .welcome-tagline {
    font-family: 'Georgia', serif;
    font-size: clamp(13px, 3.6vw, 16px);
    color: #8C7260;
    letter-spacing: 0.06em;
    font-style: italic;
  }


  /* ════════════════════════════════════════
     ZOLA CTA — fixed overlay, fades in at end
  ════════════════════════════════════════ */

  /* Fixed overlay — cross-fades in as the last card exits */
  #zolaScreen {
    position: fixed;
    inset: 0;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
  }

  .zola-btn {
    display: inline-block;
    padding: 17px 52px;
    background: #3A2718;
    color: #FAF5EF;
    text-decoration: none;
    font-family: 'Georgia', serif;
    font-size: clamp(13px, 3.8vw, 15px);
    letter-spacing: 0.14em;
    border-radius: 2px;
    transition: background 0.2s ease, box-shadow 0.2s ease, transform 0.2s ease;
  }

  .zola-btn:hover,
  .zola-btn:active {
    background: #251a10;
    box-shadow: 0 6px 22px rgba(58,39,24,0.28);
    transform: translateY(-2px);
  }
</style>
</head>
<body>

<!-- ════════════════════════════════════════
     ENVELOPE OVERLAY (fixed, fades out on open)
════════════════════════════════════════ -->
<div id="envOverlay">
  <div class="envelope-stage">

    <div class="envelope-wrapper" id="envelopeWrapper">
      <div class="envelope-body-clip">
        <img class="envelope-inside"  src="envelope_inside.png"       alt="">
        <img class="envelope-outside" src="envelope_closed_back.png"  alt="">
      </div>
      <div class="flap-container">
        <div class="flap" id="flap">
          <img class="flap-front" src="flap_closed.png"       alt="">
          <img class="flap-back"  src="evelope_open_flap.png" alt="">
        </div>
      </div>
    </div>

    <p class="tap-hint" id="tapHint">tap to open</p>

  </div>
</div>


<!-- ════════════════════════════════════════
     WELCOME SCREEN (fixed, fades in after envelope)
════════════════════════════════════════ -->
<div id="welcomeScreen">
  <p class="welcome-eyebrow">You&rsquo;re invited to</p>
  <h1 class="welcome-title">Sania &amp; Adil&rsquo;s<br>Wedding</h1>
  <p class="welcome-tagline">We can&rsquo;t wait to celebrate with you!</p>
</div>


<!-- ════════════════════════════════════════
     SCROLL HINT (fixed, appears after cross-fade)
════════════════════════════════════════ -->
<div id="scrollHint">
  swipe
  <span class="line"></span>
</div>


<!-- ════════════════════════════════════════
     CARD FRAME — fixed, always centred.
     All cards live here; pin-sections below
     are empty scroll-distance spacers.
════════════════════════════════════════ -->
<div id="card-frame">

  <div class="card-entrance" id="ent0">
    <div class="card-stage">
      <div class="card-flipper" id="flip0">
        <img class="card-face"      src="Mehndi_Front.png"        alt="Mehndi Front">
        <img class="card-face back" src="Mehndi_Back_-_Sania.png" alt="Mehndi Back">
      </div>
    </div>
  </div>

  <div class="card-entrance" id="ent1">
    <div class="card-stage">
      <div class="card-flipper" id="flip1">
        <img class="card-face"      src="Sangeet_Front.png" alt="Sangeet Front">
        <img class="card-face back" src="Sangeet_Back.png"  alt="Sangeet Back">
      </div>
    </div>
  </div>

  <div class="card-entrance" id="ent2">
    <div class="card-stage">
      <div class="card-flipper" id="flip2">
        <img class="card-face"      src="Nikkah_Front 2.png" alt="Nikkah Front">
        <img class="card-face back" src="Nikkah_Back 2.png"  alt="Nikkah Back">
      </div>
    </div>
  </div>

  <div class="card-entrance" id="ent3">
    <div class="card-stage">
      <div class="card-flipper" id="flip3">
        <img class="card-face"      src="Reception_Front.png" alt="Reception Front">
        <img class="card-face back" src="Reception_Back.png"  alt="Reception Back">
      </div>
    </div>
  </div>

</div>


<!-- ════════════════════════════════════════
     ZOLA CTA — fixed overlay, fades in after last card
════════════════════════════════════════ -->
<div id="zolaScreen">
  <a class="zola-btn" href="https://www.zola.com/wedding/adilandsania" target="_blank">
    RSVP on Zola &nbsp;↗
  </a>
</div>


<script>
// ─── Helpers ───────────────────────────────────────────────
function delay(ms) { return new Promise(r => setTimeout(r, ms)); }


// ════════════════════════════════════════
// GUEST INVITE TIERS
// ════════════════════════════════════════
const TIERS = {
  // ── All 4 ──
  'f2k9r7': ['nikkah', 'sangeet', 'mehndi', 'reception'],
  // ── Without Reception ──
  'p4m8n3': ['nikkah', 'sangeet', 'mehndi'],
  // ── Without Mehndi ──
  'w7x2q5': ['nikkah', 'sangeet', 'reception'],
  // ── Without Mehndi or Reception ──
  'h5j1t6': ['nikkah', 'sangeet'],
  // ── Nikkah + Mehndi + Reception ──
  'b9v3w4': ['nikkah', 'mehndi', 'reception'],
  // ── Nikkah + Reception only ──
  'y6z4r8': ['nikkah', 'reception'],
  // ── Nikkah only ──
  'c3n7k2': ['nikkah'],
  // ── Reception only ──
  'r5t2m8': ['reception'],
};

const EVENT_ORDER   = ['mehndi', 'sangeet', 'nikkah', 'reception'];
const urlKey        = new URLSearchParams(window.location.search).get('i');
const allowedEvents = TIERS[urlKey] ?? ['sangeet', 'mehndi', 'nikkah', 'reception'];
const visibleIdx    = EVENT_ORDER
  .map((evt, i) => allowedEvents.includes(evt) ? i : -1)
  .filter(i => i >= 0);


// ─── DOM refs ──────────────────────────────────────────────
const envOverlay      = document.getElementById('envOverlay');
const envelopeWrapper = document.getElementById('envelopeWrapper');
const flap            = document.getElementById('flap');
const tapHint         = document.getElementById('tapHint');
const scrollHint      = document.getElementById('scrollHint');
const welcomeScreen   = document.getElementById('welcomeScreen');
const zolaScreen      = document.getElementById('zolaScreen');

const N        = 4;
const entrances = Array.from({length: N}, (_, i) => document.getElementById('ent'+i));
const flippers  = Array.from({length: N}, (_, i) => document.getElementById('flip'+i));


// ─── Hide cards for uninvited events (before first paint) ───
for (let i = 0; i < N; i++) {
  if (!visibleIdx.includes(i)) entrances[i].style.display = 'none';
}

// ─── Set initial card positions (no transitions yet) ────────
for (const i of visibleIdx) {
  entrances[i].style.opacity   = '0';
  entrances[i].style.transform = 'translateY(52px)';
  flippers[i].style.transform  = 'rotateY(0deg)';
}

// ─── Body stays overflow:hidden throughout ──────────────────
document.body.style.overflow = 'hidden';


// ════════════════════════════════════════
// STEP STATE MACHINE
//
// Each swipe advances one step. Steps per card (j = 0-indexed position
// within visibleIdx):
//   2j+1 → card enters   (front face, slides up)
//   2j+2 → card flips    (back face, rotates)
//   2j+3 → card exits    (slides up out) + next card enters simultaneously
//
// maxStep = 2*numCards+1 → last card exits, RSVP appears
// ════════════════════════════════════════
const numCards = visibleIdx.length;
const maxStep  = 2 * numCards + 1;
let   step     = 0;
let   busy     = false;
const LOCK_MS  = 820; // slightly longer than longest transition (flip = 800ms)

function renderStep(s) {
  // Welcome screen
  welcomeScreen.style.opacity      = s === 0 ? '1' : '0';
  welcomeScreen.style.pointerEvents = s === 0 ? 'auto' : 'none';

  // Hint
  scrollHint.style.opacity = s === 0 ? '1' : '0';

  // RSVP
  zolaScreen.style.opacity       = s >= maxStep ? '1' : '0';
  zolaScreen.style.pointerEvents = s >= maxStep ? 'auto' : 'none';

  // Cards
  for (let j = 0; j < numCards; j++) {
    const i         = visibleIdx[j];
    const enterStep = 2 * j + 1;
    const flipStep  = 2 * j + 2;
    const exitStep  = 2 * j + 3;

    if (s < enterStep) {
      // Waiting below
      entrances[i].style.opacity   = '0';
      entrances[i].style.transform = 'translateY(52px)';
      flippers[i].style.transform  = 'rotateY(0deg)';
    } else if (s < exitStep) {
      // Visible
      entrances[i].style.opacity   = '1';
      entrances[i].style.transform = 'translateY(0px)';
      flippers[i].style.transform  = s >= flipStep ? 'rotateY(180deg)' : 'rotateY(0deg)';
    } else {
      // Exited above
      entrances[i].style.opacity   = '0';
      entrances[i].style.transform = 'translateY(-72px)';
      flippers[i].style.transform  = 'rotateY(180deg)';
    }
  }
}

function advance(dir) {
  if (busy) return;
  const next = step + dir;
  if (next < 0 || next > maxStep) return;
  busy = true;
  step = next;
  renderStep(step);
  setTimeout(() => { busy = false; }, LOCK_MS);
}


// ─── Gesture: wheel (desktop / trackpad) ───────────────────
let wheelBusy = false;
window.addEventListener('wheel', (e) => {
  if (!isOpen || wheelBusy) return;
  wheelBusy = true;
  advance(e.deltaY > 0 ? 1 : -1);
  setTimeout(() => { wheelBusy = false; }, LOCK_MS);
}, { passive: true });

// ─── Gesture: touch swipe (mobile) ─────────────────────────
let touchY0 = 0;
window.addEventListener('touchstart', (e) => {
  touchY0 = e.touches[0].clientY;
}, { passive: true });

window.addEventListener('touchend', (e) => {
  if (!isOpen) return;
  const dy = touchY0 - e.changedTouches[0].clientY;
  if (Math.abs(dy) < 40) return; // ignore tiny taps
  advance(dy > 0 ? 1 : -1);
}, { passive: true });


// ─── Envelope open ─────────────────────────────────────────
let isOpen = false;

envelopeWrapper.addEventListener('click', async () => {
  if (isOpen) return;
  isOpen = true;
  envelopeWrapper.classList.add('opened');

  tapHint.style.opacity = '0';

  flap.style.transition = 'transform 0.95s cubic-bezier(0.4, 0, 0.2, 1)';
  flap.style.transform  = 'rotateX(180deg)';

  await delay(800);

  // Enable transitions now (after initial render, so nothing flashes)
  welcomeScreen.style.transition = 'opacity 0.6s ease';
  zolaScreen.style.transition    = 'opacity 0.6s ease';
  for (const i of visibleIdx) {
    entrances[i].style.transition = 'opacity 0.55s ease, transform 0.55s ease';
    flippers[i].style.transition  = 'transform 0.8s cubic-bezier(0.4, 0, 0.2, 1)';
  }

  welcomeScreen.style.opacity = '1';
  envOverlay.style.transition = 'opacity 0.75s ease';
  envOverlay.style.opacity    = '0';

  await delay(800);
  envOverlay.style.display = 'none';
  scrollHint.style.opacity = '1';
});
</script>

</body>
</html>
